  GET ON MYCHART — Kahuku Medical Center
  Phone: Step 1 download badge, Step 2 open (app, else web sign-up).
  Computer: sign-up button + QR that opens this page on the phone.
  VERIFY: ANDROID_PACKAGE ("epic.mychart.android") via the Google Play
  listing URL or OCHIN. Test on real iPhone, Android, computer.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get on MyChart — Kahuku Medical Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap');
  :root{
    --blue:#1f6fc4; --blue-lt:#4f9fe0; --blue-dk:#143f7a;
    --tan:#a98a5b; --ink:#1c2b3a; --muted:#667584; --line:#dfe6ee; --bg:#fbfcfe;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Figtree',-apple-system,sans-serif;
    background:radial-gradient(130% 70% at 50% -20%, #fff 0%, var(--bg) 60%, #eef3f9 100%);
    color:var(--ink); min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:34px 26px; -webkit-font-smoothing:antialiased;
  }
  .card{width:100%;max-width:430px;text-align:center;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .logo{width:min(100%,420px);height:auto;margin:0 auto 34px;display:block}

  .step{font-size:1.18rem;font-weight:700;color:var(--blue-dk);margin-bottom:16px}
  .step.two{margin-top:34px}

  .badge{display:block;margin:0 auto;width:min(74%,240px);height:auto;border-radius:13px;
    transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
  .badge:hover{transform:translateY(-2px);box-shadow:0 12px 24px -12px rgba(0,0,0,.5)}
  .badge:active{transform:translateY(0) scale(.99)}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:11px;width:100%;
    padding:20px 22px;border-radius:16px;cursor:pointer;border:2px solid transparent;
    font-family:'Figtree',sans-serif;font-size:1.2rem;font-weight:700;text-decoration:none;
    color:#fff;background:linear-gradient(180deg,var(--blue),var(--blue-dk));
    box-shadow:0 12px 26px -10px rgba(20,63,122,.55),inset 0 1px 0 rgba(255,255,255,.22);
    transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 34px -10px rgba(20,63,122,.6)}
  .btn:active{transform:translateY(0) scale(.99)}
  .btn svg{width:22px;height:22px;flex:none}

  .addorg{margin-top:14px;font-size:1rem;color:var(--ink);line-height:1.5}
  .addorg b{color:var(--blue-dk)}
  .noapp{margin-top:34px;padding-top:24px;border-top:1px solid var(--line);font-size:.98rem;color:var(--muted)}
  .noapp a{color:var(--blue);font-weight:700;text-decoration:underline;text-underline-offset:3px}

  .switch{margin-top:36px;padding-top:28px;border-top:1px solid var(--line)}
  .switch-q{font-size:1.02rem;font-weight:700;color:var(--blue-dk);margin-bottom:16px}
  #qr{display:flex;justify-content:center}
  #qr img,#qr canvas{border-radius:12px;border:1px solid var(--line);padding:10px;background:#fff}

  [hidden]{display:none!important}
</style>
